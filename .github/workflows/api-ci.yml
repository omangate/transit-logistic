name: API CI

on:
  push:
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/api-ci.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/api-ci.yml'

jobs:
  api:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @transit-logistic/api exec prisma generate

      - name: Build shared packages
        run: pnpm --filter @transit-logistic/shared build

      - name: Lint API
        run: pnpm --filter @transit-logistic/api lint

      - name: Typecheck API
        run: pnpm --filter @transit-logistic/api typecheck

      - name: Test API
        run: pnpm --filter @transit-logistic/api test

      - name: Build API
        run: pnpm --filter @transit-logistic/api build
